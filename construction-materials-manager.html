<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Construction Materials Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bp:#fff;--bs:#f5f5f4;--bt:#efefec;
  --bsuc:#dcfce7;--bdan:#fee2e2;--bwrn:#fef3c7;
  --tp:#1c1c1a;--ts:#6b6b67;--tsuc:#166534;--tdan:#991b1b;--twrn:#92400e;
  --bd:rgba(28,28,26,.12);--bdm:rgba(28,28,26,.25);
  --bdsuc:rgba(22,101,52,.3);--bddan:rgba(153,27,27,.3);
  --rmd:8px;--rlg:12px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --a:#D97706;--ad:#B45309;
}
@media(prefers-color-scheme:dark){:root{
  --bp:#1c1c1a;--bs:#282825;--bt:#1a1a18;
  --bsuc:#14532d;--bdan:#450a0a;--bwrn:#431407;
  --tp:#f5f5f0;--ts:#a8a8a0;--tsuc:#86efac;--tdan:#fca5a5;--twrn:#fcd34d;
  --bd:rgba(255,255,255,.1);--bdm:rgba(255,255,255,.2);
  --bdsuc:rgba(134,239,172,.3);--bddan:rgba(252,165,165,.3);
}}
html,body{height:100%;background:var(--bt);color:var(--tp);font-family:var(--f)}
input,select{font-family:var(--f);font-size:13px;color:var(--tp);background:var(--bp);border:.5px solid var(--bdm);border-radius:var(--rmd);padding:7px 10px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--a);box-shadow:0 0 0 2px rgba(217,119,6,.18)}
input:disabled{opacity:.5}
button{font-family:var(--f);font-size:13px;cursor:pointer;border-radius:var(--rmd);border:.5px solid var(--bdm);padding:7px 14px;background:var(--bp);color:var(--tp);transition:background .12s}
button:hover{background:var(--bs)}
button:active{transform:scale(.98)}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-weight:500;color:var(--ts);padding:8px 10px;text-align:left;font-size:12px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;border-bottom:.5px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bs)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bdm);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const e=React.createElement;
const {useState,useMemo,useEffect,useRef,useCallback}=React;

/* ── constants ── */
const CATS=["CEMENT","STEEL","WOOD","BRICK","AGGREGATE","PAINT","PLUMBING","ELECTRICAL","INSULATION","OTHER"];
const UNITS=["KG","TON","LITER","METER","SQUARE_METER","CUBIC_METER","UNIT","BAG","ROLL"];
const CC={CEMENT:"#78716c",STEEL:"#64748b",WOOD:"#a16207",BRICK:"#c2410c",AGGREGATE:"#737373",PAINT:"#0d9488",PLUMBING:"#0284c7",ELECTRICAL:"#D97706",INSULATION:"#16a34a",OTHER:"#7c3aed"};

/* ── seed data ── */
let _m=1,_t=1;
const td=new Date().toLocaleDateString();
function mkM(n,c,q,u,p,ms,s){return{id:_m++,name:n,category:c,quantity:q,unit:u,unitPrice:p,minStock:ms,supplier:s,updated:td};}
function mkT(mid,mn,t,q,p,nt){return{id:_t++,materialId:mid,materialName:mn,type:t,quantity:q,unitPrice:p,notes:nt,date:td};}
const SM=[
  mkM("Portland Cement","CEMENT",480,"BAG",12.50,100,"CemEx Supplies"),
  mkM("Steel Rebar 12mm","STEEL",150,"KG",3.80,50,"SteelPro Ltd"),
  mkM("Structural Timber","WOOD",90,"CUBIC_METER",280.00,20,"TimberWorks Co"),
  mkM("Clay Bricks","BRICK",8000,"UNIT",0.45,500,"BrickMasters"),
  mkM("Crushed Gravel","AGGREGATE",30,"TON",45.00,10,"QuarryDirect"),
  mkM("Interior Paint","PAINT",20,"LITER",8.20,30,"ColorFast Paint"),
  mkM("PVC Pipe 50mm","PLUMBING",60,"METER",4.10,20,"FlowTech Plumbing"),
  mkM("Conduit Wire 2.5mm","ELECTRICAL",400,"METER",1.90,50,"ElectroParts"),
  mkM("Fiberglass Insulation","INSULATION",8,"ROLL",35.00,10,"IsoThermal Co"),
  mkM("Silicone Sealant","OTHER",15,"UNIT",11.00,20,"BuildFix Store"),
];
const ST=[].concat(
  SM.map(function(m){return mkT(m.id,m.name,"STOCK_IN",m.quantity,m.unitPrice,"Initial stock");}),
  [mkT(1,"Portland Cement","STOCK_OUT",20,12.50,"Block A - Foundation"),
   mkT(2,"Steel Rebar 12mm","STOCK_OUT",50,3.80,"Block A - Columns"),
   mkT(3,"Structural Timber","STOCK_IN",10,180,"Restock PO-2024-88"),
   mkT(6,"Interior Paint","STOCK_OUT",100,8.20,"Block B - Interior")]
);

/* ── helpers ── */
function f$(n){return "$"+((n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}));}
function isLow(m){return m.quantity<=m.minStock;}
function cap(s){return s.charAt(0)+s.slice(1).toLowerCase().replace(/_/g," ");}
var SKEY="cms_v2";
function saveD(d){try{localStorage.setItem(SKEY,JSON.stringify(d));}catch(x){}}
function loadD(){try{var r=localStorage.getItem(SKEY);return r?JSON.parse(r):null;}catch(x){return null;}}
function buildSys(mats){
  var total=mats.reduce(function(s,m){return s+m.quantity*m.unitPrice;},0);
  var low=mats.filter(isLow);
  return "You are a construction materials inventory expert. Be concise. Use bullet points.\n\nINVENTORY:\n- "+mats.length+" materials | Value: "+f$(total)+"\n- Low stock ("+low.length+"): "+(low.map(function(m){return m.name+" ("+m.quantity+"/"+m.minStock+" "+cap(m.unit)+")";}).join("; ")||"none")+"\n\nMATERIALS:\n"+mats.map(function(m){return "["+m.id+"] "+m.name+" | "+m.category+" | "+m.quantity+" "+cap(m.unit)+" @ "+f$(m.unitPrice)+" | min:"+m.minStock+" | "+m.supplier;}).join("\n")+"\n\nAnswer questions, suggest reorders, analyze costs.";
}

/* ── style constants ── */
var card={background:"var(--bp)",border:".5px solid var(--bd)",borderRadius:"var(--rlg)",padding:"1rem 1.25rem"};
var metricS={background:"var(--bs)",borderRadius:"var(--rmd)",padding:"12px 14px"};
var btnA={background:"var(--a)",color:"#fff",border:"none",borderRadius:"var(--rmd)",padding:"7px 14px",fontWeight:500,cursor:"pointer",fontSize:13,fontFamily:"var(--f)"};
var btnG={background:"#16a34a",color:"#fff",border:"none",borderRadius:"var(--rmd)",padding:"7px 14px",fontWeight:500,cursor:"pointer",fontSize:13,fontFamily:"var(--f)"};

/* ── SVG Bar Chart ── */
function BarChart(props){
  var data=props.data, h=props.height||180;
  var max=Math.max.apply(null,data.map(function(d){return d.value;}).concat([1]));
  var W=580, padB=44, padL=44, padT=8, padR=8;
  var bW=Math.max(4,Math.floor((W-padL-padR)/data.length)-4);
  var bH=h-padT-padB;
  var ticks=[0,0.25,0.5,0.75,1].map(function(p){return {v:max*p,y:padT+bH*(1-p)};});
  return e("svg",{width:"100%",viewBox:"0 0 "+W+" "+h,style:{overflow:"visible"}},
    ticks.map(function(t,i){
      return e("g",{key:i},
        e("line",{x1:padL,x2:W-padR,y1:t.y,y2:t.y,stroke:"var(--bd)",strokeWidth:.5}),
        e("text",{x:padL-5,y:t.y+4,textAnchor:"end",fontSize:9,fill:"var(--ts)"},"$"+Math.round(t.v).toLocaleString())
      );
    }),
    data.map(function(d,i){
      var bh=Math.max(d.value>0?2:0,(d.value/max)*bH);
      var x=padL+i*(bW+4);
      var y=padT+bH-bh;
      return e("g",{key:i},
        e("rect",{x:x,y:y,width:bW,height:bh,fill:d.color,rx:2}),
        e("text",{
          x:x+bW/2, y:h-padB+12,
          textAnchor:"end", fontSize:9, fill:"var(--ts)",
          transform:"rotate(-40,"+( x+bW/2)+","+(h-padB+12)+")"
        },d.name)
      );
    })
  );
}

/* ── SVG Donut Chart ── */
function DonutChart(props){
  var data=props.data, size=props.size||160;
  var total=data.reduce(function(s,d){return s+d.value;},0)||1;
  var r=55,cx=size/2,cy=size/2,sw=24;
  var circ=2*Math.PI*r;
  var cum=0;
  var slices=data.map(function(d){
    var pct=d.value/total;
    var sl={pct:pct,start:cum,color:d.color};
    cum+=pct;
    return sl;
  });
  return e("svg",{width:size,height:size,viewBox:"0 0 "+size+" "+size},
    slices.map(function(s,i){
      var dash=s.pct*circ;
      var gap=circ-dash;
      var rot=s.start*360-90;
      return e("circle",{key:i,cx:cx,cy:cy,r:r,fill:"none",stroke:s.color,strokeWidth:sw,
        strokeDasharray:dash+" "+gap,
        transform:"rotate("+rot+" "+cx+" "+cy+")"
      });
    }),
    e("circle",{cx:cx,cy:cy,r:r-sw/2-2,fill:"var(--bp)"})
  );
}

/* ── Badge ── */
function Badge(props){
  var type=props.type;
  var M={STOCK_IN:{bg:"#dcfce7",c:"#166534"},STOCK_OUT:{bg:"#fee2e2",c:"#991b1b"},ADJUSTMENT:{bg:"#fef3c7",c:"#92400e"},PENDING:{bg:"#fef3c7",c:"#92400e"},RECEIVED:{bg:"#dcfce7",c:"#166534"},CANCELLED:{bg:"#fee2e2",c:"#991b1b"}};
  var s=M[type]||M.ADJUSTMENT;
  return e("span",{style:{fontSize:10,fontWeight:500,padding:"2px 8px",borderRadius:20,background:s.bg,color:s.c,whiteSpace:"nowrap"}},cap(type));
}

/* ── Toast ── */
function Toast(props){
  var msg=props.msg,onDone=props.onDone;
  useEffect(function(){if(msg){var t=setTimeout(onDone,3200);return function(){clearTimeout(t);}}},[msg]);
  if(!msg)return null;
  return e("div",{style:{padding:"10px 14px",borderRadius:"var(--rmd)",marginBottom:12,fontSize:13,
    background:msg.ok?"var(--bsuc)":"var(--bdan)",color:msg.ok?"var(--tsuc)":"var(--tdan)",
    border:".5px solid "+(msg.ok?"var(--bdsuc)":"var(--bddan)")}},msg.text);
}

/* ── Metric ── */
function Metric(props){
  return e("div",{style:metricS},
    e("div",{style:{fontSize:12,color:"var(--ts)",marginBottom:4}},props.label),
    e("div",{style:{fontSize:22,fontWeight:500,color:props.accent||"var(--tp)"}},props.value),
    props.sub&&e("div",{style:{fontSize:11,color:"var(--ts)",marginTop:2}},props.sub)
  );
}

/* ── Nav ── */
function Nav(props){
  var view=props.view,setView=props.setView,lc=props.lowCount;
  var tabs=[["dashboard","Dashboard"],["materials","Materials"+(lc>0?" \u26A0"+lc:"")],["stock","Stock ops"],["transactions","Transactions"],["orders","Purchase orders"],["projects","Projects"],["suppliers","Suppliers"],["ai","AI assistant"],["reports","Reports"]];
  return e("nav",{style:{display:"flex",borderBottom:"1px solid var(--bd)",overflowX:"auto",background:"var(--bp)",position:"sticky",top:0,zIndex:100,flexShrink:0}},
    e("div",{style:{display:"flex",alignItems:"center",padding:"0 16px",borderRight:"1px solid var(--bd)",flexShrink:0}},
      e("span",{style:{fontSize:14,fontWeight:500,color:"var(--a)",whiteSpace:"nowrap"}},"\uD83C\uDFD7 CMS")
    ),
    tabs.map(function(t){
      var k=t[0],l=t[1],active=view===k;
      return e("button",{key:k,onClick:function(){setView(k);},style:{
        flexShrink:0,padding:"13px 13px",fontSize:12,fontWeight:500,cursor:"pointer",
        color:active?"var(--a)":"var(--ts)",background:"none",border:"none",
        borderBottom:"2px solid "+(active?"var(--a)":"transparent"),
        whiteSpace:"nowrap",fontFamily:"var(--f)"
      }},l);
    })
  );
}

/* ── Dashboard ── */
function Dashboard(props){
  var materials=props.materials,transactions=props.transactions,stats=props.stats,setView=props.setView;
  var barData=useMemo(function(){
    return CATS.map(function(c){
      return {name:cap(c).slice(0,6),value:parseFloat(materials.filter(function(m){return m.category===c;}).reduce(function(s,m){return s+m.quantity*m.unitPrice;},0).toFixed(2)),color:CC[c]};
    }).filter(function(d){return d.value>0;});
  },[materials]);
  return e("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}},
      e(Metric,{label:"Total materials",value:materials.length,sub:stats.lowStock.length+" low stock"}),
      e(Metric,{label:"Inventory value",value:f$(stats.totalValue),accent:"var(--a)",sub:"all categories"}),
      e(Metric,{label:"Low stock alerts",value:stats.lowStock.length,sub:stats.lowStock.length>0?"needs attention":"all stocked",accent:stats.lowStock.length>0?"#dc2626":undefined}),
      e(Metric,{label:"Transactions",value:transactions.length,sub:"all movements"})
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14}},
      e("div",{style:card},
        e("div",{style:{fontSize:14,fontWeight:500,marginBottom:12}},"Inventory value by category"),
        e(BarChart,{data:barData,height:190})
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:14,fontWeight:500,marginBottom:10}},"Recent activity"),
        e("div",{style:{display:"flex",flexDirection:"column",gap:5}},
          [].concat(transactions).reverse().slice(0,8).map(function(t){
            return e("div",{key:t.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:12,padding:"3px 0",borderBottom:".5px solid var(--bd)"}},
              e("span",{style:{color:"var(--ts)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}},t.materialName),
              e(Badge,{type:t.type})
            );
          })
        ),
        e("button",{onClick:function(){setView("transactions");},style:{marginTop:10,width:"100%",fontSize:12,padding:"6px",background:"none",border:".5px solid var(--bdm)",borderRadius:"var(--rmd)",cursor:"pointer",color:"var(--ts)"}},"View all \u2192")
      )
    ),
    stats.lowStock.length>0&&e("div",{style:Object.assign({},card,{borderColor:"var(--bddan)"})},
      e("div",{style:{fontSize:14,fontWeight:500,color:"#dc2626",marginBottom:10}},"\u26A0 Low stock alerts"),
      stats.lowStock.map(function(m){
        return e("div",{key:m.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderRadius:"var(--rmd)",background:"var(--bdan)",border:".5px solid var(--bddan)",marginBottom:6}},
          e("span",{style:{fontWeight:500,fontSize:13}},m.name),
          e("span",{style:{fontSize:12,color:"var(--ts)"}},m.quantity+" / "+cap(m.unit)),
          e("span",{style:{fontSize:12,color:"#dc2626"}},"min: "+m.minStock)
        );
      })
    )
  );
}

/* ── MatForm ── */
function MatForm(props){
  var init=props.init,onSave=props.onSave,onCancel=props.onCancel;
  var def=init||{name:"",category:"CEMENT",quantity:0,unit:"BAG",unitPrice:0,minStock:0,supplier:""};
  var _s=useState(def); var f=_s[0]; var setF=_s[1];
  function s(k,v){setF(function(p){var o=Object.assign({},p);o[k]=v;return o;});}
  function numFld(label,key){
    return e("div",{style:{display:"flex",flexDirection:"column",gap:4}},
      e("label",{style:{fontSize:12,fontWeight:500,color:"var(--ts)"}},label),
      e("input",{type:"number",min:0,step:key==="unitPrice"?0.01:1,value:f[key],onChange:function(ev){s(key,parseFloat(ev.target.value)||0);}})
    );
  }
  function selFld(label,key,opts){
    return e("div",{style:{display:"flex",flexDirection:"column",gap:4}},
      e("label",{style:{fontSize:12,fontWeight:500,color:"var(--ts)"}},label),
      e("select",{value:f[key],onChange:function(ev){s(key,ev.target.value);}},
        opts.map(function(o){return e("option",{key:o,value:o},o);})
      )
    );
  }
  return e("div",{style:Object.assign({},card,{border:"1px solid var(--a)",marginBottom:14})},
    e("div",{style:{fontSize:14,fontWeight:500,color:"var(--a)",marginBottom:12}},init?"Edit material":"Add new material"),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      e("div",{style:{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:4}},
        e("label",{style:{fontSize:12,fontWeight:500,color:"var(--ts)"}},"Name"),
        e("input",{value:f.name,onChange:function(ev){s("name",ev.target.value);},placeholder:"Material name"})
      ),
      selFld("Category","category",CATS),
      selFld("Unit","unit",UNITS),
      numFld("Quantity","quantity"),
      numFld("Unit price ($)","unitPrice"),
      numFld("Min stock level","minStock"),
      e("div",{style:{display:"flex",flexDirection:"column",gap:4}},
        e("label",{style:{fontSize:12,fontWeight:500,color:"var(--ts)"}},"Supplier"),
        e("input",{value:f.supplier,onChange:function(ev){s("supplier",ev.target.value);},placeholder:"Supplier"})
      )
    ),
    e("div",{style:{display:"flex",gap:8,marginTop:14}},
      e("button",{onClick:function(){if(f.name)onSave(f);},style:btnA},"Save material"),
      e("button",{onClick:onCancel},"Cancel")
    )
  );
}

/* ── Materials Page ── */
function MaterialsPage(props){

  var _3=useState(false); var showAdd=_3[0]; var setShowAdd=_3[1];
  var _4=useState(null); var editing=_4[0]; var setEditing=_4[1];

  var rows=useMemo(function(){
    return materials.filter(function(m){

      e(ExportBtn,{onClick:function(){exportCSV("materials.csv",["ID","Name","Category","Qty","Unit","Unit Price","Total Value","Min Stock","Supplier","Status"],rows.map(function(m){return[m.id,m.name,m.category,m.quantity,cap(m.unit),m.unitPrice,(m.quantity*m.unitPrice).toFixed(2),m.minStock,m.supplier,isLow(m)?"Low":"OK"];}));}})
    ),

        e("button",{onClick:function(){setConfirm(null);}},"Cancel")
      )
    ),
    e("div",{style:Object.assign({},card,{padding:0,overflow:"auto"})},
      e("table",null,
        e("thead",null,e("tr",null,["ID","Name","Category","Qty","Unit","Price","Value","Min","Supplier","Status",""].map(function(h){return e("th",{key:h},h);}))),
        e("tbody",null,
          rows.length===0
            ?e("tr",null,e("td",{colSpan:11,style:{textAlign:"center",color:"var(--ts)",padding:28}},"No materials found"))
            :rows.map(function(m){
              return e("tr",{key:m.id},
                e("td",{style:{color:"var(--ts)",fontSize:11}},m.id),
                e("td",{style:{fontWeight:500,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},m.name),
                e("td",null,e("span",{style:{width:8,height:8,borderRadius:"50%",background:CC[m.category],display:"inline-block",marginRight:5}}),cap(m.category)),
                e("td",{style:{fontFamily:"var(--mono)",fontSize:12}},m.quantity.toLocaleString()),

/* ── CSV Export helper ── */
function exportCSV(filename,headers,rows){
  var lines=[headers.join(",")].concat(rows.map(function(r){
    return r.map(function(c){
      var s=String(c==null?"":c);
      return s.indexOf(",")>=0||s.indexOf('"')>=0?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(",");
  }));
  var blob=new Blob([lines.join("\r\n")],{type:"text/csv"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

      setTransactions(function(p){return p.concat([{id:prev,materialId:mid,materialName:mn,type:type,quantity:qty,unitPrice:price,notes:notes,date:new Date().toLocaleDateString()}]);});
      return prev+1;
    });
  },[]);

  var addMaterial=useCallback(function(data){
    setNextMid(function(prev){
      var id=prev;
      var m=Object.assign({},data,{id:id,updated:new Date().toLocaleDateString()});
      setMaterials(function(p){return p.concat([m]);});
      if(data.quantity>0)addTx(id,data.name,"STOCK_IN",data.quantity,data.unitPrice,"Initial stock");
      return prev+1;
    });
  },[addTx]);

  var updateMaterial=useCallback(function(id,data){
    setMaterials(function(p){return p.map(function(m){return m.id===id?Object.assign({},m,data,{updated:new Date().toLocaleDateString()}):m;});});
  },[]);

  var deleteMaterial=useCallback(function(id){
    setMaterials(function(p){return p.filter(function(m){return m.id!==id;});});
  },[]);

  var stockIn=useCallback(function(id,qty,price,notes){
    setMaterials(function(p){return p.map(function(m){return m.id===id?Object.assign({},m,{quantity:m.quantity+qty}):m;});});
    setMaterials(function(cur){var m=cur.find(function(m){return m.id===id;});if(m)addTx(id,m.name,"STOCK_IN",qty,price,notes);return cur;});
  },[addTx]);

  var stockOut=useCallback(function(id,qty,notes){
    var ok=false;
    setMaterials(function(p){return p.map(function(m){if(m.id===id&&m.quantity>=qty){ok=true;return Object.assign({},m,{quantity:m.quantity-qty});}return m;});});
    setMaterials(function(cur){var m=cur.find(function(m){return m.id===id;});if(m&&ok)addTx(id,m.name,"STOCK_OUT",qty,m.unitPrice,notes);return cur;});
  },[addTx]);

  var adjustStock=useCallback(function(id,nq,notes){
    setMaterials(function(p){return p.map(function(m){if(m.id===id){addTx(id,m.name,"ADJUSTMENT",Math.abs(nq-m.quantity),m.unitPrice,notes);return Object.assign({},m,{quantity:nq});}return m;});});
  },[addTx]);

  var addOrder=useCallback(function(po){
    setNextOid(function(prev){
      var id=prev,num="PO-"+String(id).padStart(3,"0");
      setOrders(function(p){return p.concat([Object.assign({},po,{id:id,number:num,status:"PENDING",date:new Date().toLocaleDateString()})]);});
      return prev+1;
    });
  },[]);

  var receiveOrder=useCallback(function(id){
    setOrders(function(p){
      var o=p.find(function(o){return o.id===id;});
      if(!o||o.status!=="PENDING")return p;
      o.items.forEach(function(it){stockIn(it.materialId,it.quantity,it.unitPrice,o.number+" received");});
      return p.map(function(o){return o.id===id?Object.assign({},o,{status:"RECEIVED"}):o;});
    });
  },[stockIn]);

  var cancelOrder=useCallback(function(id){
    setOrders(function(p){return p.map(function(o){return o.id===id?Object.assign({},o,{status:"CANCELLED"}):o;});});
  },[]);

  var stats=useMemo(function(){
    return {
      totalValue:materials.reduce(function(s,m){return s+m.quantity*m.unitPrice;},0),
      lowStock:materials.filter(isLow)
    };
  },[materials]);

  var ctx={materials:materials,transactions:transactions,stats:stats,orders:orders,addMaterial:addMaterial,updateMaterial:updateMaterial,deleteMaterial:deleteMaterial,stockIn:stockIn,stockOut:stockOut,adjustStock:adjustStock,addOrder:addOrder,receiveOrder:receiveOrder,cancelOrder:cancelOrder,setView:setView};

  return e("div",{style:{display:"flex",flexDirection:"column",minHeight:"100vh"}},
    e(Nav,{view:view,setView:setView,lowCount:stats.lowStock.length}),
    e("main",{style:{flex:1,padding:"20px 24px",maxWidth:1200,width:"100%",margin:"0 auto"}},
      !loaded
        ?e("div",{style:{textAlign:"center",padding:60,color:"var(--ts)"}},"Loading\u2026")
        :e(React.Fragment,null,
          view==="dashboard"&&e(Dashboard,ctx),
          view==="materials"&&e(MaterialsPage,ctx),
          view==="stock"&&e(StockPage,ctx),
          view==="transactions"&&e(TransactionsPage,{transactions:transactions}),
          view==="orders"&&e(PurchaseOrdersPage,ctx),
          view==="projects"&&e(ProjectsPage,{materials:materials,stockOut:stockOut,transactions:transactions}),
          view==="suppliers"&&e(SuppliersPage,{materials:materials,orders:orders}),
          view==="ai"&&e(AIPage,{materials:materials}),
          view==="reports"&&e(ReportsPage,ctx)
        )
    )
  );
}

ReactDOM.render(e(App,null),document.getElementById("root"));
</script>
</body>
</html>
